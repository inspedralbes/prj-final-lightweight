map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# HTTP: solo ACME challenge + redirect a HTTPS
server {
  listen 80;
  server_name lightweight.daw.inspedralbes.cat;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl;
  server_name lightweight.daw.inspedralbes.cat;

  ssl_certificate     /etc/letsencrypt/live/lightweight.daw.inspedralbes.cat/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lightweight.daw.inspedralbes.cat/privkey.pem;

  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       10m;

  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://backend:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /adminer/ {
    proxy_pass http://adminer:8080/;
    proxy_set_header Host      $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    proxy_pass http://frontend:5173;
    proxy_set_header Host      $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}